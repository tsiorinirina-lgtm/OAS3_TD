openapi: 3.0.3
info:
  title: API Bibliothèque HEI
  version: 1.0.0
  description: Gestion de livres et des emprunts
servers:
  - url: https://api.hei.school/v1
  - url: https://staging.hei.school/v1
    description: Environnement de test
paths:
  /livres:
    get:
      summary: Lister les livres
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
          description: Numéro de la page à récupérer
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
          description: Nombre de livres par page
      responses:
        "200":
          description: Liste des livres
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Livre"

    post:
      summary: Ajouter un livre
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/Livre"
      responses:
        "201":
          description: Livre créé
        "422":
          description: Données invalides
  /livres/{id}:
    get:
      summary: Lire un livre
      parameters:
        - name: id
          in: path
          schema: { type: integer }
          required: true
      responses:
        "200":
          description: Livre trouvé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Livre"
        "404":
          description: Livre introuvable
    put:
      summary: remplacer un livre
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/Livre"
      responses:
        "200":
          description: Livre remplacé
        "404":
          description: Livre introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erreur"
              example:
                type: "https://api.hei.school/erreurs/livre-introuvable"
                title: Livre introuvable
                status: 404
                detail: Aucun livre trouvé avec l'identifiant fourni.
        "422":
          description: Données invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erreur"
              example:
                type: "https://api.hei.school/erreurs/donnees-invalides"
                title: Données invalides
                status: 422
                detail: Les données fournies pour le livre sont invalides. Veuillez vérifier les champs requis et leur format.
    patch:
      summary: Mettre à jour un livre
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/Livre"
      responses:
        "200":
          description: Livre mis à jour
        "404":
          description: Livre introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erreur"
              example:
                type: "https://api.hei.school/erreurs/livre-introuvable"
                title: Livre introuvable
                status: 404
                detail: Aucun livre trouvé avec l'identifiant fourni.
        "422":
          description: Données invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erreur"
              example:
                type: "https://api.hei.school/erreurs/donnees-invalides"
                title: Données invalides
                status: 422
                detail: Les données fournies pour le livre sont invalides. Veuillez vérifier les champs requis et leur format.
    delete:
      summary: Supprimer un livre
      parameters:
        - name: id
          in: path
          schema: { type: integer }
          required: true
      responses:
        "204":
          description: Livre supprimé
        "404":
          description: Livre introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erreur"
              example:
                type: "https://api.hei.school/erreurs/livre-introuvable"
                title: Livre introuvable
                status: 404
                detail: Aucun livre trouvé avec l'identifiant fourni.
  /emprunts:
    post:
      summary: Emprunter un livre
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
              $ref: "#/components/schemas/Emprunts"
      responses:
        "201":
          description: Livre emprunté
        "422":
          description: Données invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erreur"
              example:
                type: "https://api.hei.school/erreurs/donnees-invalides"
                title: Données invalides
                status: 422
                detail: Les données fournies pour le livre sont invalides. Veuillez vérifier les champs requis et leur format.
  /livres/{id}/emprunts:
    get:
      summary: Lister les emprunts du livre
      responses:
        "200":
          description: Liste des emprunts du livre
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Emprunts"
components:
  schemas:
    Livre:
      type: object
      properties:
        id:
          type: integer
        titre:
          type: string
        auteur:
          type: string
      required:
        - titre
      example:
        id: 42
        titre: Dadabe
        auteur: Michèle Rakotoson
    Erreur:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
      required:
        - type
        - title
    Emprunts:
      type: object
      properties:
        id:
          type: integer
        LivreId:
          type: integer
        DateEmprunt:
          type: string
          format: date
        DateRetour:
          type: string
          format: date
